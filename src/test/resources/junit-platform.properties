cucumber.publish.quiet=true
cucumber.publish.enabled=false
cucumber.snippet-type=camelcase
cucumber.execution.dry-run=false
cucumber.junit-platform.naming-strategy=CUSTOM
cucumber.step.notifications.enabled=false
cucumber.filter.skipped.scenarios=true
cucumber.rerun.strategy=DEFERRED
cucumber.max.retry.failed.scenarios=2

# Dynamic parallel execution
cucumber.execution.parallel.enabled=true

#Virtual thread options
cucumber.execution.parallel.virtual-thread.enabled=true
cucumber.execution.parallel.virtual-thread.max-threads=32

# Strategy
cucumber.execution.parallel.config.strategy=dynamic

# Scaling thresholds
cucumber.execution.parallel.config.dynamic.scale-up-threshold=0.8
cucumber.execution.parallel.config.dynamic.scale-down-threshold=0.3
cucumber.execution.parallel.config.dynamic.scaling-interval-seconds=30

#Trace parallel execution
cucumber.execution.parallel.trace.enabled=false

cucumber.execution.parallel.config.fixed.parallelism=4
cucumber.execution.parallel.config.config.dynamic.factor=1.0
junit.jupiter.execution.parallel.enabled=true
cucumber.object-factory=io.github.ygrip.testara.engine.factory.TestaraCucumberObjectFactory
cucumber.glue=io.github.ygrip.testara,io.github.ygrip.example
cucumber.filter.tags=(@Sanity) and not (@Manual or @Deprecated or @Ignored)
cucumber.features=src/test/resources/features/
#cucumber.features=@target/rerun/rerun.txt